name: Documentation update
description: Propose a clear, actionable change to the project documentation or wiki. Provide rationale and a concise implementation suggestion.
title: "[Documentation update]: "
labels: ["documentation_update"]
assignees:
  - LinuxBeginnings

body:
  - type: textarea
    id: desc
    attributes:
      label: Summary
      description: "Succinctly describe the documentation change you're proposing and the user-facing problem it addresses."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Proposed change
      description: "Describe the specific content edits, new pages, or structural changes you suggest. Include snippets or markdown examples if helpful."
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: |
        Include supporting material: links, screenshots, diagrams, example fixtures, or small sample files. Prefer attachments or links over long inline dumps.
  
  - type: dropdown
    id: upstream
    attributes:
      label: Reported upstream?
      description: "Has this been discussed or filed upstream already? (optional)"
      options:
        - "Yes"
        - "No"
        - "Not sure"

  - type: input
    id: upstream_link
    attributes:
      label: Upstream link / discussion
      description: "Upstream issue/PR URL or reference (optional)."
